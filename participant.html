<!DOCTYPE html>
<html><head><meta name='viewport' content='width=device-width,initial-scale=1'>
<style>
body{font-family:sans-serif;padding:10px}.grid{display:grid;grid-template-columns:repeat(var(--n),1fr);gap:6px}
.cell{aspect-ratio:1;border:2px dashed #888;display:flex;align-items:center;justify-content:center;overflow:hidden}
.cell img{width:100%;height:100%;object-fit:cover}
#confetti{position:fixed;inset:0;pointer-events:none}
.piece{position:absolute;animation:fall 3s linear forwards}
@keyframes fall{from{transform:translateY(-50px)}to{transform:translateY(100vh) rotate(720deg);opacity:0}}
</style></head><body>
<h2>フォトビンゴ</h2>
<p>QRコードから参加</p>
<select id='size'><option value='3'>3×3</option><option value='5'>5×5</option></select>
<div id='grid' class='grid'></div>
<input id='pick' type='file' accept='image/*' capture='environment' hidden>
<div id='confetti'></div>
<script>
const g=document.getElementById('grid'),p=document.getElementById('pick'),c=document.getElementById('confetti');let target;
function draw(n){g.style.setProperty('--n',n);g.innerHTML='';for(let i=0;i<n*n;i++){let d=document.createElement('div');d.className='cell';d.textContent=i+1;d.onclick=()=>{target=d;p.click();};g.appendChild(d);}}
function celebrate(){for(let i=0;i<80;i++){let e=document.createElement('div');e.className='piece';e.textContent='🎉';e.style.left=Math.random()*100+'vw';c.appendChild(e);setTimeout(()=>e.remove(),3000);}alert('BINGO達成！');}
function check(){if([...g.children].every(x=>x.querySelector('img')))celebrate();}
document.getElementById('size').onchange=e=>draw(+e.target.value);
draw(3);
p.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{target.innerHTML='<img src="'+r.result+'">';check();};r.readAsDataURL(f);};
</script></body></html>
